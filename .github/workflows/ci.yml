name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop, 'feature/**' ]
  pull_request:
    branches: [ main, master, develop ]

env:
  NODE_VERSION: '20'

jobs:
  # =====================================================
  # Job 1: 代码质量检查 (Lint & Type Check)
  # =====================================================
  lint-and-typecheck:
    name: Code Quality Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run ESLint
      run: npm run lint
      
    - name: Type check
      run: npx tsc --noEmit

  # =====================================================
  # Job 2: 单元测试 (Unit Tests)
  # =====================================================
  unit-tests:
    name: Unit Tests
    runs-on: windows-latest  # Windows runner for Electron app
    timeout-minutes: 15
    needs: lint-and-typecheck
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Run unit tests
      run: npm run test:unit
      
    - name: Generate coverage report
      run: npm run test:coverage
      
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage/lcov.info
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

  # =====================================================
  # Job 3: 构建测试 (Build Test)
  # =====================================================
  build-test:
    name: Build Test
    runs-on: windows-latest
    timeout-minutes: 20
    needs: unit-tests
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build application
      run: npm run build
      
    - name: Package application (dry run)
      run: npm run package

  # =====================================================
  # Job 4: 发布检查 (Release Check)
  # =====================================================
  release-check:
    name: Release Check
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [unit-tests, build-test]
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Build and package
      run: |
        npm run build
        npm run package
        npm run make

  # =====================================================
  # Job 5: 测试结果通知 (Notifications)
  # =====================================================
  test-notify:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, unit-tests, build-test]
    if: always()
    
    steps:
    - name: Test Summary
      run: |
        echo "========================================="
        echo "         Test Results Summary"
        echo "========================================="
        echo "Lint & Type Check: ${{ needs.lint-and-typecheck.result }}"
        echo "Unit Tests: ${{ needs.unit-tests.result }}"
        echo "Build Test: ${{ needs.build-test.result }}"
        echo "========================================="
    
    - name: Job Status
      if: needs.lint-and-typecheck.result == 'success' && needs.unit-tests.result == 'success' && needs.build-test.result == 'success'
      run: echo "✅ All jobs passed!"
    
    - name: Job Status (Failed)
      if: needs.lint-and-typecheck.result != 'success' || needs.unit-tests.result != 'success' || needs.build-test.result != 'success'
      run: |
        echo "❌ Some jobs failed!"
        exit 1
